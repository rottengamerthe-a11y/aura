  <text x="85" y="198" fill="#fecdd3" font-size="28" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="85" dy="0">Invites, ownership, privacy,</tspan>
    <tspan x="85" dy="34">and guild progress.</tspan>
  </text>
